# alembic.ini

[alembic]
# 마이그레이션 스크립트가 위치한 경로 (매우 중요)
script_location = src/pgdb/migrations

# 프로젝트 루트를 sys.path에 추가
prepend_sys_path = .

# 마이그레이션 파일명 생성 규칙 (YYYYMMDD_HHMMSS_설명 형태)
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d%%(second)02d_%%(slug)s

# timezone 설정 (UTC 기준)
timezone = UTC

[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S